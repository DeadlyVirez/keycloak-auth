issuer: http://dex:5556

web:
  http: 0.0.0.0:5556

storage:
  type: sqlite3
  config:
    file: /etc/dex/dex.db

staticClients:
  - id: example-app
    secret: example-secret
    name: "Example App"
    redirectURIs:
      - "http://localhost:8080/auth/realms/example-realm/broker/dex-siam-mock/endpoint"

enablePasswordDB: true

staticPasswords:
  - email: "test@example.com"
    hash: "$2b$10$WEOxi1sazH.kTPrhz3yePukIwiuacDfkoMMETHPNe.pDN4HI9hZCC" # bcrypt hash for "password"
    username: "testuser"
    userID: "1234"
    groups:
      - admin
      - user
