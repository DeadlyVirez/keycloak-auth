---
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.3
    container_name: keycloak
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_RELATIVE_PATH: /auth
    command:
      - "start-dev"
      - "--import-realm"
    ports:
      - "8080:8080"
    networks:
      - keycloak-network
    volumes:
      - ./docker/keycloak/realm.json:/opt/keycloak/data/import/realm.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://keycloak:8080/auth/realms/example-realm"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  keycloak-health:
    image: curlimages/curl:latest
    depends_on:
      - keycloak
    restart: "no"
    networks:
      - keycloak-network
    command: |
      /bin/sh -c '
      while true; do
        if curl -sf http://keycloak:8080/auth/realms/example-realm > /dev/null; then
          echo "Realm found, wait 5 seconds for Keycloak to stabilize..."
          sleep 5
          
          # Final Check
          if curl -sf http://keycloak:8080/auth/realms/example-realm > /dev/null; then
            echo "Keycloak is ready and stable!"
            exit 0
          fi
        fi
        echo "Wait for Keycloak..."
        sleep 5
      done
      '
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://keycloak:8080/auth/realms/example-realm > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  dex:
    image: ghcr.io/dexidp/dex:v2.35.3
    container_name: dex-siam-mock
    ports:
      - "5556:5556"
    volumes:
      - ./docker/dex/dex-config.yaml:/etc/dex/config.yaml
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    networks:
      - keycloak-network

  app:
    build: .
    container_name: example-app
    restart: unless-stopped
    depends_on:
      keycloak-health:
        condition: service_completed_successfully
      dex:
        condition: service_started
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: example-realm
      KEYCLOAK_CLIENT_ID: example-app
      KEYCLOAK_CLIENT_SECRET: your-client-secret
      CALLBACK_URL: http://example-app:3000/auth/callback
      SESSION_SECRET: my-secret
    ports:
      - "3000:3000"
    networks:
      - keycloak-network

volumes:
  keycloak-db:

networks:
  keycloak-network:
    driver: bridge